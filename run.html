<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stress Test</title>
    <style>
        /* HUD styling */
        #hud {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            z-index: 10000;
            font-family: monospace;
            font-size: 14px;
            border: 2px solid #00ff00;
            min-width: 200px;
        }

        .hud-item {
            margin: 8px 0;
            padding: 5px;
        }

        .hud-label {
            color: #00ff00;
            font-weight: bold;
        }

        .hud-value {
            color: #ffff00;
            display: inline-block;
            margin-left: 10px;
        }

        /* Image overlay index styling */
        .image-index-label {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 8px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #00ff00;
            z-index: 100;
        }

        img {
            position: relative;
            display: block;
            margin: 10px auto;
            max-width: 90vw;
            height: auto;
        }
    </style>
</head>
<body>
    <!-- HUD Display -->
    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">Current Image:</span>
            <span class="hud-value" id="currentImageIndex">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Total Seen:</span>
            <span class="hud-value" id="totalImagesSeen">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Unique Images:</span>
            <span class="hud-value" id="uniqueImages">0</span>
        </div>
    </div>

    <script>
        // Initialize tracking variables
        let seenImageIndices = new Set();
        let maxIndexSeen = -1;
        let imageIndexMap = {};
        let imageCount = 0;

        // Function to add index overlay to images
        function addImageIndexOverlay() {
            const images = document.querySelectorAll('img');
            images.forEach((img, index) => {
                // Skip if already labeled
                if (img.hasAttribute('data-index-labeled')) {
                    return;
                }

                // Create wrapper for relative positioning
                if (img.parentElement.style.position !== 'relative') {
                    img.parentElement.style.position = 'relative';
                }

                // Create index label
                const label = document.createElement('div');
                label.className = 'image-index-label';
                label.textContent = `#${index}`;
                label.setAttribute('data-image-index', index);

                // Insert label after image
                img.parentElement.appendChild(label);
                img.setAttribute('data-index-labeled', 'true');
                img.setAttribute('data-image-index', index);

                imageIndexMap[index] = img;
                imageCount = Math.max(imageCount, index + 1);
            });
        }

        // Function to update HUD with current visible image
        function updateHUD() {
            const images = document.querySelectorAll('img[data-image-index]');
            let currentVisibleIndex = -1;

            images.forEach((img) => {
                const rect = img.getBoundingClientRect();
                // Check if image is in viewport
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    const index = parseInt(img.getAttribute('data-image-index'));
                    currentVisibleIndex = index;
                    seenImageIndices.add(index);
                    maxIndexSeen = Math.max(maxIndexSeen, index);
                }
            });

            // Update HUD display
            document.getElementById('currentImageIndex').textContent = currentVisibleIndex >= 0 ? currentVisibleIndex : 'N/A';
            document.getElementById('totalImagesSeen').textContent = imageCount;
            document.getElementById('uniqueImages').textContent = seenImageIndices.size;

            // Store in session storage
            if (typeof(Storage) !== "undefined") {
                sessionStorage.setItem('imageCount', imageCount);
                sessionStorage.setItem('uniqueImages', seenImageIndices.size);
                sessionStorage.setItem('currentImage', currentVisibleIndex);
            }
        }

        // Initial setup
        window.addEventListener('load', () => {
            addImageIndexOverlay();
            updateHUD();
        });

        // Update on scroll
        window.addEventListener('scroll', () => {
            addImageIndexOverlay(); // In case new images are loaded
            updateHUD();
        });

        // Update periodically for dynamically loaded images
        setInterval(() => {
            addImageIndexOverlay();
            updateHUD();
        }, 500);

        // Check if browser supports sessionStorage
        if (typeof(Storage) === "undefined") {
            console.log('Session storage not supported');
        }
    </script>
</body>
</html>
