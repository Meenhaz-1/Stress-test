<script>
    // Check if browser supports sessionStorage
    if (typeof(Storage) !== "undefined") {
        // Track the last visible image during autoscroll
        window.addEventListener('scroll', function() {
            const images = document.querySelectorAll('img');
            let lastVisibleImage = null;
            images.forEach((img) => {
                const rect = img.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    lastVisibleImage = img.src;  // Store the src of the last visible image
                }
            });
            if (lastVisibleImage) {
                sessionStorage.setItem('lastVisibleImage', lastVisibleImage);
            }
        });
    } else {
        console.log('Session storage not supported');
    }
</script>
